<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Getsêmani - Login</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #0f172a; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 10px 25px rgba(0,0,0,0.3); width: 100%; max-width: 400px; text-align: center; }
        h1 { color: #0f172a; margin-bottom: 5px; font-size: 28px; font-weight: bold; }
        p { color: #64748b; margin-top: 0; margin-bottom: 30px; font-size: 14px; font-weight: 500; }
        input { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #cbd5e1; border-radius: 8px; box-sizing: border-box; font-size: 14px; }
        button { width: 100%; padding: 14px; background: #38bdf8; color: #0f172a; border: none; border-radius: 8px; font-weight: bold; font-size: 16px; cursor: pointer; transition: 0.2s; }
        button:hover { background: #0ea5e9; color: white; }
        .alerta { background: #fee2e2; color: #991b1b; padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 14px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="login-card">
        <h1>GETSÊMANI</h1>
        <p>ECOSSISTEMA DE GESTÃO ECLESIÁSTICA</p>
        
        {% with mensagens = get_flashed_messages(category_filter=["erro"]) %}
            {% if mensagens %}
                {% for msg in mensagens %}
                    <div class="alerta">{{ msg }}</div>
                --{% endfor %}
            {% endif %}
        {% endwith %}

        <form action="/login" method="POST">
            <input type="text" name="login" placeholder="Usuário ou Login" required autocomplete="off">
            <input type="password" name="senha" placeholder="Senha de Acesso" required>
            <button type="submit">ENTRAR NO ECOSSISTEMA</button>
        </form>
    </div>
</body>
</html>
